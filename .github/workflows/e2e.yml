name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: frontend

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js setup ────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── Install dependencies ─────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── Cache Playwright browsers ────────────────────────────────────────────
      - name: Cache Playwright binaries
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Chromium OS dependencies only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # ── TypeScript check ─────────────────────────────────────────────────────
      - name: TypeScript type-check (app)
        run: npx tsc --noEmit --skipLibCheck

      - name: TypeScript type-check (e2e)
        run: npx tsc --project tsconfig.e2e.json --noEmit

      # ── Run E2E tests ────────────────────────────────────────────────────────
      - name: Run Playwright E2E tests
        run: npx playwright test --reporter=list,html
        env:
          CI: true

      # ── Upload HTML report on failure ────────────────────────────────────────
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
